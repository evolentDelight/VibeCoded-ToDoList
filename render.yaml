services:
  - type: web
    name: todolist
    runtime: node
    region: oregon

    buildCommand: |
      cd backend && npm install
      cd ../frontend && npm install && npm run build

    startCommand: cd backend && node server.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: todolist-db
          property: connectionString

databases:
  - name: todolist-db
    plan: free
